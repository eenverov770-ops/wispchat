<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой QR-код</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            padding-top: 54px;
            padding-bottom: 80px;
        }
        body.dark {
            background: #1c1c1e;
            color: #f5f5f7;
        }
        body.dark .header {
            background: rgba(28,28,30,0.92);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }
        body.dark .qr-card {
            background: #2c2c2e;
        }
        body.dark .qr-card .username {
            color: #f5f5f7;
        }
        body.dark .qr-card .hint {
            color: #8e8e93;
        }
        body.dark .qr-card .code-text {
            background: #1c1c1e;
            color: #8e8e93;
        }
        body.dark .btn-share {
            background: #1c1c1e;
            color: #f5f5f7;
        }
        body.dark .btn-share:active {
            background: #3a3a3c;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(245,245,247,0.92);
            backdrop-filter: saturate(180%) blur(20px);
            padding: 10px 16px 8px;
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
            z-index: 100;
            max-width: 600px;
            margin: 0 auto;
            transition: background 0.3s, border-color 0.3s;
        }
        .header .back {
            font-size: 24px;
            color: #1c1c1e;
            text-decoration: none;
            margin-right: 12px;
        }
        .header .title {
            font-size: 17px;
            font-weight: 600;
            color: #1c1c1e;
            transition: color 0.3s;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            text-align: center;
        }
        .qr-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 32px 24px 28px;
            margin-top: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            transition: background 0.3s;
        }
        .qr-card .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #e5e5ea;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            color: #1c1c1e;
            overflow: hidden;
        }
        .qr-card .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .qr-card .username {
            font-size: 20px;
            font-weight: 700;
            color: #1c1c1e;
            transition: color 0.3s;
        }
        .qr-card .hint {
            font-size: 14px;
            color: #8e8e93;
            margin-top: 4px;
            margin-bottom: 20px;
        }
        .qr-card .qr-image {
            background: #ffffff;
            padding: 16px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .qr-card .qr-image img {
            width: 180px;
            height: 180px;
            display: block;
        }
        .qr-card .code-text {
            font-size: 13px;
            color: #8e8e93;
            word-break: break-all;
            margin-top: 16px;
            padding: 12px 16px;
            background: #f5f5f7;
            border-radius: 14px;
            font-family: monospace;
            letter-spacing: 0.5px;
            transition: background 0.3s, color 0.3s;
        }
        .qr-card .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }
        .btn-share {
            flex: 1;
            padding: 14px 20px;
            background: #1c1c1e;
            color: white;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-share:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        .btn-download {
            flex: 1;
            padding: 14px 20px;
            background: #e5e5ea;
            color: #1c1c1e;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-download:active {
            transform: scale(0.95);
            opacity: 0.7;
        }
        body.dark .btn-download {
            background: #3a3a3c;
            color: #f5f5f7;
        }
        body.dark .qr-card .qr-image {
            background: #1c1c1e;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="{% url 'profile' %}" class="back">←</a>
        <span class="title">Мой QR-код</span>
    </div>
    <div class="container">
        <div class="qr-card">
            <!-- Аватар -->
            <div class="avatar">
                {% if user.profile.avatar %}
                    <img src="{{ user.profile.avatar.url }}" alt="{{ user.username }}">
                {% else %}
                    {{ user.username|slice:":1"|upper }}
                {% endif %}
            </div>
            <!-- Имя -->
            <div class="username">{{ user.username }}</div>
            <div class="hint">Отсканируйте QR-код, чтобы добавить в друзья</div>
            <!-- QR-код -->
            <div class="qr-image">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data={{ qr_text|urlencode }}" alt="QR-код">
            </div>
            <!-- Текст кода -->
            <div class="code-text">{{ qr_text }}</div>
            <!-- Кнопки -->
            <div class="actions">
                <button class="btn-share" onclick="shareQR()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="18" cy="5" r="3"/>
                        <circle cx="6" cy="12" r="3"/>
                        <circle cx="18" cy="19" r="3"/>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                    Поделиться
                </button>
                <button class="btn-download" onclick="downloadQR()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Скачать
                </button>
            </div>
        </div>
    </div>
    <script>
        const theme = document.cookie.split('; ').find(row => row.startsWith('theme='))?.split('=')[1] || 'light';
        if (theme === 'dark') {
            document.body.classList.add('dark');
        }
        function shareQR() {
            const text = "Добавьте меня в друзья в WatanymChat: {{ qr_text }}";
            if (navigator.share) {
                navigator.share({ title: 'Мой QR-код', text: text });
            } else {
                navigator.clipboard.writeText(text).then(() => alert('✅ Скопировано!'));
            }
        }
        function downloadQR() {
            const img = document.querySelector('.qr-image img');
            fetch(img.src)
                .then(response => response.blob())
                .then(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'qr_code_{{ user.username }}.png';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                });
        }
    </script>
</body>
</html>
