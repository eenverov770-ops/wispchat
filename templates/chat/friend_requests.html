<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Заявки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            padding-top: 54px;
            padding-bottom: 80px;
        }
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(245,245,247,0.92);
            backdrop-filter: saturate(180%) blur(20px);
            padding: 10px 16px 8px;
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
            z-index: 100;
            max-width: 600px;
            margin: 0 auto;
        }
        .header .back {
            font-size: 24px;
            color: #1c1c1e;
            text-decoration: none;
            margin-right: 12px;
        }
        .header .title {
            font-size: 17px;
            font-weight: 600;
            color: #1c1c1e;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        .request-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
        }
        .btn-accept {
            background: #1c1c1e;
            color: white;
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-accept:active { transform: scale(0.95); opacity: 0.7; }
        .empty {
            text-align: center;
            padding: 40px 0;
            color: #8e8e93;
        }
        .empty span {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="{% url 'search' %}" class="back">←</a>
        <span class="title">Заявки в друзья</span>
    </div>
    <div class="container">
        {% if requests %}
            {% for req in requests %}
                <div class="request-item">
                    <span><strong>{{ req.from_user.username }}</strong> хочет добавить вас в друзья</span>
                    <a href="{% url 'accept_friend_request' req.id %}" class="btn-accept">✅ Принять</a>
                </div>
            {% endfor %}
        {% else %}
            <div class="empty">
                <span>📭</span>
                Нет новых заявок
            </div>
        {% endif %}
    </div>
</body>
</html>
