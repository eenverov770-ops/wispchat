<!DOCTYPE html>
<html>
<head>
    <title>Создать чат</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            padding-top: 54px;
            padding-bottom: 80px;
        }
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(245,245,247,0.92);
            backdrop-filter: saturate(180%) blur(20px);
            padding: 10px 16px 8px;
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
            z-index: 100;
            max-width: 600px;
            margin: 0 auto;
        }
        .header .back {
            font-size: 24px;
            color: #1c1c1e;
            text-decoration: none;
            margin-right: 12px;
        }
        .header .title {
            font-size: 17px;
            font-weight: 600;
            color: #1c1c1e;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        .field {
            margin-bottom: 16px;
        }
        .field label {
            font-size: 14px;
            font-weight: 600;
            color: #1c1c1e;
            display: block;
            margin-bottom: 4px;
        }
        .field input, .field select, .field textarea {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 0.5px solid rgba(0,0,0,0.08);
            border-radius: 16px;
            background: #f8f8fc;
            outline: none;
            transition: 0.2s;
            color: #1c1c1e;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: #8e8e93;
            background: #ffffff;
        }
        .field input[type="file"] {
            padding: 10px;
            background: #f8f8fc;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 10px 0;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            width: calc(50% - 10px);
            font-weight: 400;
        }
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            background: #1c1c1e;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn:active { transform: scale(0.97); opacity: 0.8; }
        .helptext {
            font-size: 12px;
            color: #8e8e93;
            display: block;
            margin-top: 4px;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #1c1c1e;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="{% url 'home' %}" class="back">←</a>
        <span class="title">Создать чат</span>
    </div>
    <div class="container">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="field">
                <label>Название чата</label>
                {{ form.name }}
            </div>
            
            <div class="field">
                <label>Аватар чата</label>
                {{ form.avatar }}
                <span class="helptext">Загрузите картинку для аватара (необязательно)</span>
            </div>
            
            <div class="field">
                <label>Описание чата</label>
                {{ form.description }}
                <span class="helptext">Краткое описание беседы (необязательно)</span>
            </div>
            
            <div class="field">
                <label>Групповой чат?</label>
                {{ form.is_group }}
                <span class="helptext">Отметьте, если это беседа с несколькими участниками</span>
            </div>
            
            <div class="field">
                <label>Участники</label>
                <div class="checkbox-group">
                    {{ form.members }}
                </div>
                <span class="helptext">Выберите участников</span>
            </div>
            
            <button type="submit" class="btn">Создать чат</button>
        </form>
        <a href="{% url 'home' %}" class="back-link">← На главную</a>
    </div>
</body>
</html>
