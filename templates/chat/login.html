<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wisp</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wisp">
    <meta name="theme-color" content="#1C1C1E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #F2F2F7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
            transition: background 0.3s;
        }
        body.dark {
            background: #0A0A0A;
        }
        body.dark .container {
            background: #1C1C1E;
        }
        body.dark .logo-text { color: #F5F5F7; }
        body.dark .subtitle { color: #8E8E93; }
        body.dark .field label { color: #F5F5F7; }
        body.dark .field input {
            background: #2C2C2E;
            color: #F5F5F7;
            border: 0.5px solid rgba(255,255,255,0.05);
        }
        body.dark .field input:focus {
            border-color: #0A7A3C;
            background: #1C1C1E;
        }
        body.dark .btn {
            background: #0A7A3C;
            color: #F5F5F7;
        }
        body.dark .footer { color: #8E8E93; }
        body.dark .footer a { color: #0A7A3C; }
        body.dark .error {
            background: #2C2C2E;
            color: #FF6B6B;
        }
        .container {
            background: #FFFFFF;
            border-radius: 32px;
            padding: 40px 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            transition: background 0.3s;
        }
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: #0A7A3C;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: #FFFFFF;
            box-shadow: 0 4px 16px rgba(10,122,60,0.25);
        }
        .logo-text {
            font-size: 32px;
            font-weight: 700;
            color: #1C1C1E;
            letter-spacing: -0.5px;
            transition: color 0.3s;
        }
        .logo-text span { color: #8E8E93; font-weight: 300; }
        .subtitle {
            text-align: center;
            font-size: 16px;
            color: #8E8E93;
            margin-bottom: 30px;
            transition: color 0.3s;
        }
        .field { margin-bottom: 16px; }
        .field label {
            font-size: 14px;
            font-weight: 600;
            color: #1C1C1E;
            display: block;
            margin-bottom: 4px;
            transition: color 0.3s;
        }
        .field input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 0.5px solid rgba(0,0,0,0.08);
            border-radius: 16px;
            background: #F2F2F7;
            outline: none;
            transition: 0.2s, background 0.3s, color 0.3s, border-color 0.3s;
            color: #1C1C1E;
            font-family: inherit;
        }
        .field input:focus {
            border-color: #0A7A3C;
            background: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(10,122,60,0.08);
        }
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            background: #0A7A3C;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 16px rgba(10,122,60,0.2);
        }
        .btn:active { transform: scale(0.97); opacity: 0.9; }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
            color: #8E8E93;
            transition: color 0.3s;
        }
        .footer a {
            color: #0A7A3C;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }
        .error {
            background: #FFEBEE;
            color: #C62828;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: center;
            transition: background 0.3s, color 0.3s;
        }
    </style>
</head>
<body class="{% if theme == 'dark' %}dark{% endif %}">
    <div class="container">
        <div class="logo-area">
            <div class="logo-icon">W</div>
            <div class="logo-text">WispChat</span></div>
        </div>
        <div class="subtitle">Войдите в свой аккаунт</div>
        
        {% if form.errors %}
            <div class="error">Неверный логин или пароль</div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label>Логин</label>
                {{ form.username }}
            </div>
            <div class="field">
                <label>Пароль</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn">Войти</button>
        </form>
        
        <div class="footer">
            Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js')
                .then(function(reg) { console.log('SW registered'); })
                .catch(function(err) { console.log('SW error:', err)); });
        }
        const theme = document.cookie.split('; ').find(row => row.startsWith('theme='))?.split('=')[1] || 'light';
        if (theme === 'dark') { document.body.classList.add('dark'); }
    </script>
</body>
</html>
