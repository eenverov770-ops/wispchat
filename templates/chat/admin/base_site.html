{% extends "admin/base.html" %}
{% load static %}

{% block title %}WispChat — Админ-панель{% endblock %}

{% block branding %}
<div style="display: flex; align-items: center; gap: 12px; padding: 4px 0;">
    <div style="background: #0A7A3C; color: white; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; box-shadow: 0 4px 12px rgba(10, 122, 60, 0.3);">W</div>
    <div style="font-size: 20px; font-weight: 700; color: #FFFFFF;">Wisp<span style="color: #8E8E93; font-weight: 300;">Chat</span></div>
</div>
{% endblock %}

{% block usertools %}
<div style="display: flex; align-items: center; gap: 16px; color: #8E8E93;">
    <span style="color: #F5F5F7;">👋 {{ user.username }}</span>
    <a href="{% url 'admin:logout' %}" style="color: #8E8E93; text-decoration: none;">🚪 Выйти</a>
    <a href="{% url 'home' %}" style="color: #8E8E93; text-decoration: none;">🏠 На сайт</a>
</div>
{% endblock %}
