<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wisp — История</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wisp">
    <meta name="theme-color" content="#1C1C1E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #F2F2F7;
            color: #1C1C1E;
            padding-top: 54px;
            padding-bottom: 80px;
            transition: background 0.3s, color 0.3s;
        }
        body.dark {
            background: #0A0A0A;
            color: #F5F5F7;
        }
        body.dark .header {
            background: #1C1C1E;
        }
        body.dark .header .back { color: #F5F5F7; }
        body.dark .header .title { color: #F5F5F7; }
        body.dark .header .actions a { color: #F5F5F7; }
        body.dark .filter-bar a {
            background: #1C1C1E;
            color: #F5F5F7;
        }
        body.dark .filter-bar a.active {
            background: #0A7A3C;
            color: #F5F5F7;
        }
        body.dark .activity-item {
            background: #1C1C1E;
        }
        body.dark .activity-item .action { color: #F5F5F7; }
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: #1C1C1E;
            padding: 10px 16px 8px;
            display: flex;
            align-items: center;
            border-bottom: none;
            z-index: 100;
            max-width: 600px;
            margin: 0 auto;
            transition: background 0.3s;
        }
        .header .back {
            font-size: 22px;
            color: #FFFFFF;
            text-decoration: none;
            margin-right: 12px;
            opacity: 0.8;
            transition: color 0.3s;
        }
        .header .back:active { opacity: 0.5; }
        .header .title {
            font-size: 17px;
            font-weight: 600;
            color: #FFFFFF;
            transition: color 0.3s;
        }
        .header .actions {
            margin-left: auto;
        }
        .header .actions a {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            background: rgba(255,255,255,0.1);
            padding: 6px 14px;
            border-radius: 30px;
            transition: 0.2s, background 0.3s, color 0.3s;
        }
        .header .actions a:active { opacity: 0.7; }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-bar a {
            padding: 8px 20px;
            border-radius: 30px;
            background: #FFFFFF;
            color: #1C1C1E;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }
        .filter-bar a.active {
            background: #0A7A3C;
            color: white;
        }
        .filter-bar a:active { transform: scale(0.95); }
        .activity-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #FFFFFF;
            border-radius: 16px;
            margin-bottom: 6px;
            transition: 0.15s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }
        .activity-item .action {
            font-size: 15px;
            color: #1C1C1E;
            transition: color 0.3s;
        }
        .activity-item .time {
            font-size: 13px;
            color: #8E8E93;
            flex-shrink: 0;
            margin-left: 12px;
        }
        .activity-item .icon {
            font-size: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .empty {
            text-align: center;
            padding: 40px 0;
            color: #8E8E93;
        }
        .empty span { font-size: 48px; display: block; margin-bottom: 12px; }
    </style>
</head>
<body class="{% if theme == 'dark' %}dark{% endif %}">
    <div class="header">
        <a href="{% url 'home' %}" class="back">←</a>
        <span class="title">История</span>
        <div class="actions">
            <a href="{% url 'clear_activity' %}" onclick="return confirm('Очистить всю историю?')">Очистить</a>
        </div>
    </div>
    <div class="container">
        <div class="filter-bar">
            <a href="?hours=1" {% if hours == 1 %}class="active"{% endif %}>1 час</a>
            <a href="?hours=6" {% if hours == 6 %}class="active"{% endif %}>6 часов</a>
            <a href="?hours=24" {% if hours == 24 %}class="active"{% endif %}>24 часа</a>
            <a href="?hours=0" {% if hours == 0 %}class="active"{% endif %}>Всё</a>
        </div>
        {% if activities %}
            {% for activity in activities %}
                <div class="activity-item">
                    <div style="display:flex; align-items:center;">
                        <span class="icon">📌</span>
                        <span class="action">{{ activity.action }}</span>
                    </div>
                    <span class="time">{{ activity.timestamp|date:"d.m.Y H:i" }}</span>
                </div>
            {% endfor %}
        {% else %}
            <div class="empty">
                <span>📭</span>
                Нет действий за выбранный период
            </div>
        {% endif %}
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js')
                .then(r => console.log('SW ok'))
                .catch(e => console.log('SW err', e));
        }
        const theme = document.cookie.split('; ').find(row => row.startsWith('theme='))?.split('=')[1] || 'light';
        if (theme === 'dark') { document.body.classList.add('dark'); }
    </script>
</body>
</html>
