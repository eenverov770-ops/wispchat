<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Добавить по QR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            padding-top: 54px;
            padding-bottom: 80px;
        }
        body.dark {
            background: #1c1c1e;
            color: #f5f5f7;
        }
        body.dark .header {
            background: rgba(28,28,30,0.92);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }
        body.dark .qr-input {
            background: #2c2c2e;
            color: #f5f5f7;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        body.dark .btn-add {
            background: #2c2c2e;
            color: #f5f5f7;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(245,245,247,0.92);
            backdrop-filter: saturate(180%) blur(20px);
            padding: 10px 16px 8px;
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
            z-index: 100;
            max-width: 600px;
            margin: 0 auto;
        }
        .header .back {
            font-size: 24px;
            color: #1c1c1e;
            text-decoration: none;
            margin-right: 12px;
        }
        .header .title {
            font-size: 17px;
            font-weight: 600;
            color: #1c1c1e;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            text-align: center;
        }
        .qr-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .qr-card .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .qr-card .hint {
            font-size: 16px;
            color: #8e8e93;
            margin-bottom: 20px;
        }
        .qr-card textarea {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 0.5px solid rgba(0,0,0,0.08);
            background: #f8f8fc;
            font-size: 14px;
            font-family: monospace;
            outline: none;
            resize: vertical;
            min-height: 80px;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        .qr-card textarea:focus {
            border-color: #8e8e93;
            background: #ffffff;
        }
        .btn-add {
            width: 100%;
            padding: 14px;
            background: #1c1c1e;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: 0.2s;
        }
        .btn-add:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        .btn-scan {
            width: 100%;
            padding: 14px;
            background: #e5e5ea;
            color: #1c1c1e;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        .btn-scan:active {
            transform: scale(0.95);
            opacity: 0.7;
        }
        body.dark .btn-scan {
            background: #3a3a3c;
            color: #f5f5f7;
        }
        body.dark .qr-card {
            background: #2c2c2e;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="{% url 'profile' %}" class="back">←</a>
        <span class="title">Добавить по QR</span>
    </div>
    <div class="container">
        <div class="qr-card">
            <div class="icon">📷</div>
            <div class="hint">
                Вставьте текст из QR-кода или отсканируйте его<br>
                <span style="font-size: 13px; color: #8e8e93;">Пример: WatanymChat:AddFriend:1:username:abc123</span>
            </div>
            <form method="post">
                {% csrf_token %}
                <textarea name="qr_text" placeholder="Вставьте текст QR-кода сюда..." required></textarea>
                <button type="submit" class="btn-add">➕ Добавить друга</button>
            </form>
            <button class="btn-scan" onclick="scanQR()">📸 Сканировать QR-код</button>
        </div>
    </div>
    <script>
        const theme = document.cookie.split('; ').find(row => row.startsWith('theme='))?.split('=')[1] || 'light';
        if (theme === 'dark') {
            document.body.classList.add('dark');
        }

        function scanQR() {
            // В iOS/Android можно открыть камеру через Web API
            if ('mediaDevices' in navigator && 'getUserMedia' in navigator.mediaDevices) {
                alert('Наведите камеру на QR-код и вставьте текст в поле выше.\n\nИли используйте встроенный сканер вашего телефона.');
            } else {
                alert('Используйте встроенный сканер QR-кодов на вашем телефоне или стороннее приложение.');
            }
        }
    </script>
</body>
</html>
