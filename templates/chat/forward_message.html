<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Переслать</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            padding-top: 54px;
            padding-bottom: 80px;
        }
        body.dark { background: #1c1c1e; color: #f5f5f7; }
        body.dark .header { background: rgba(28,28,30,0.92); border-bottom: 0.5px solid rgba(255,255,255,0.1); }
        body.dark .chat-item { border-bottom: 0.5px solid rgba(255,255,255,0.05); }
        body.dark .chat-name { color: #f5f5f7; }
        body.dark .message-preview { background: #2c2c2e; color: #f5f5f7; }
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(245,245,247,0.92);
            backdrop-filter: saturate(180%) blur(20px);
            padding: 10px 16px 8px;
            display: flex;
            align-items: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
            z-index: 100;
            max-width: 600px;
            margin: 0 auto;
            transition: background 0.3s, border-color 0.3s;
        }
        .header .back {
            font-size: 24px;
            color: #1c1c1e;
            text-decoration: none;
            margin-right: 12px;
        }
        .header .title {
            font-size: 17px;
            font-weight: 600;
            color: #1c1c1e;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        .message-preview {
            background: #e9e9ed;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            transition: background 0.3s, color 0.3s;
        }
        .message-preview .label {
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 4px;
        }
        .message-preview .content {
            font-size: 16px;
            color: #1c1c1e;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
            text-decoration: none;
            color: inherit;
            border-radius: 12px;
            padding: 12px 8px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .chat-item:active { background: rgba(0,0,0,0.03); }
        .chat-avatar {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: #e5e5ea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            color: #1c1c1e;
            flex-shrink: 0;
            margin-right: 14px;
            object-fit: cover;
            overflow: hidden;
        }
        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .chat-name { font-size: 16px; font-weight: 600; color: #1c1c1e; }
        .chat-info { flex: 1; min-width: 0; }
        .empty {
            text-align: center;
            padding: 40px 0;
            color: #8e8e93;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="javascript:history.back()" class="back">←</a>
        <span class="title">Переслать сообщение</span>
    </div>
    <div class="container">
        <div class="message-preview">
            <div class="label">📩 Переслать сообщение</div>
            <div class="content">{{ message.content|truncatechars:100 }}</div>
        </div>
        {% if chats %}
            <form method="post">
                {% csrf_token %}
                {% for chat in chats %}
                    <div class="chat-item" onclick="this.querySelector('input[type=radio]').click();">
                        <div class="chat-avatar">
                            {% if chat.avatar %}
                                <img src="{{ chat.avatar.url }}" alt="{{ chat.name }}">
                            {% else %}
                                {{ chat.name|slice:":1"|upper }}
                            {% endif %}
                        </div>
                        <div class="chat-info">
                            <div class="chat-name">{{ chat.name }}</div>
                        </div>
                        <input type="radio" name="chat_id" value="{{ chat.id }}" style="margin-left:auto;">
                    </div>
                {% endfor %}
                <button type="submit" style="width:100%; padding:14px; background:#1c1c1e; color:white; border:none; border-radius:30px; font-size:16px; font-weight:600; cursor:pointer; margin-top:16px;">Переслать</button>
            </form>
        {% else %}
            <div class="empty">Нет чатов для пересылки</div>
        {% endif %}
    </div>
    <script>
        const theme = document.cookie.split('; ').find(row => row.startsWith('theme='))?.split('=')[1] || 'light';
        if (theme === 'dark') {
            document.body.classList.add('dark');
        }
    </script>
</body>
</html>
