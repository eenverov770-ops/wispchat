<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет интернета</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #F2F2F7;
            color: #1C1C1E;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 400px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        p {
            font-size: 16px;
            color: #8E8E93;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: #0A7A3C;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Нет подключения</h1>
        <p>Проверьте интернет-соединение и попробуйте снова</p>
        <button class="btn" onclick="location.reload()">Обновить</button>
    </div>
</body>
</html>
